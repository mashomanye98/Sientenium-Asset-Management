spring.application.name=SienteniumAssetManagement

# PostgreSQL connection (no invalid parameters)
spring.datasource.url=jdbc:postgresql://localhost:5432/asset_management_system
spring.datasource.username=postgres
spring.datasource.password=Slender

# JPA properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=8080

# Max file size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Upload directory
file.upload-dir=src/main/resources/static/uploads/
