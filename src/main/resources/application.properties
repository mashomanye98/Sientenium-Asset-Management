spring.application.name=SienteniumAssetManagement

# PostgreSQL connection (no invalid parameters)
spring.datasource.url=jdbc:postgresql://localhost:5432/SienteniumAssetManagement
spring.datasource.username=postgres
spring.datasource.password=password

# JPA properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=8080
