spring.application.name=SienteniumAssetManagement

# PostgreSQL connection (no invalid parameters)
spring.datasource.url=jdbc:postgresql://localhost:5432/Asset_db
spring.datasource.username=postgres
spring.datasource.password=password

# JPA properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=8082

# Max file size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Upload directory
file.upload-dir=src/main/resources/static/uploads/

# Default admin credentials
app.default.admin.email=${DEFAULT_ADMIN_EMAIL:admin@sientenium.com}
app.default.admin.password=${DEFAULT_ADMIN_PASSWORD:Admin@123}
app.default.admin.full-name=${DEFAULT_ADMIN_FULL_NAME:System Administrator}
app.default.admin.department=${DEFAULT_ADMIN_DEPARTMENT:Administration}
