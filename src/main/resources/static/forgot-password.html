<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Sientenium</title>
  <link rel="stylesheet" href="styles/sign-In.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="container">
  <div class="right-panel" style="margin:0; box-shadow:none;">
    <div class="top-bar">
      <div class="logo">
        <div class="logo-icon"><img src="images/Sientenium.jpg" alt="Sientenium Logo"></div>
        <span>Sientenium</span>
      </div>
      <a href="signIn.html" class="signup-link">
        <i class="fa-solid fa-right-to-bracket"></i>
        <span>Back to Sign In</span>
      </a>
    </div>

    <div class="form-container">
      <div id="customAlert" class="alert"></div>
      <h2>Forgot your password?</h2>
      <p style="font-size:13px;color:#6b7280;margin-bottom:15px;">
        Enter your account email and we'll send you a secure link to reset your password.
      </p>

      <form id="forgotForm" autocomplete="off">
        <div class="input-group">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" id="fpEmail" placeholder="Email" required>
        </div>
        <button type="submit" class="btn">Send Reset Link</button>
      </form>
    </div>

    <div class="footer">
      <p>© 2026 Sientenium Inc.</p>
      <a href="termsandconditions.html">Terms and Conditions</a>
      <a href="contactus.html">Contact Us</a>
    </div>
  </div>
</div>
<script src="scripts/forgot-password.js"></script>
</body>
</html>
