<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Sientenium</title>
  <link rel="stylesheet" href="styles/sign-In.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="container">
  <div class="right-panel" style="margin:0; box-shadow:none;">
    <div class="top-bar">
      <div class="logo">
        <div class="logo-icon"><img src="images/Sientenium.jpg" alt="Sientenium Logo"></div>
        <span>Sientenium</span>
      </div>
      <a href="signIn.html" class="signup-link">
        <i class="fa-solid fa-right-to-bracket"></i>
        <span>Back to Sign In</span>
      </a>
    </div>

    <div class="form-container">
      <div id="customAlert" class="alert"></div>
      <h2>Set a new password</h2>
      <p style="font-size:13px;color:#6b7280;margin-bottom:15px;">
        Create a strong password you haven't used before.
      </p>

      <form id="resetForm" autocomplete="off">
        <input type="hidden" id="token">
        <div class="input-group">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="newPassword" placeholder="New Password" required>
          <i class="fa-solid fa-eye toggle-password" data-target="newPassword"></i>
        </div>
        <div class="input-group">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
          <i class="fa-solid fa-eye toggle-password" data-target="confirmPassword"></i>
        </div>
        <button type="submit" class="btn">Update Password</button>
      </form>
    </div>

    <div class="footer">
      <p>© 2026 Sientenium Inc.</p>
      <a href="termsandconditions.html">Terms and Conditions</a>
    </div>
  </div>
</div>
<script src="scripts/forgot-password.js"></script>
</body>
</html>
