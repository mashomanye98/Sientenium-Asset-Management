<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan App - Sign Up</title>
    <link rel="stylesheet" href="styles/sign-Up.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- LEFT PANEL -->
    <div class="left-panel">
        <!-- Tagline in center -->
        <div class="overlay">
            <p class="tagline">Your Assets. Organized. Protected and Optimized.</p>
        </div>
    </div>
      

    <!-- RIGHT PANEL -->
<div class="right-panel">

    <div class="top-bar">

    <!-- Back Button LEFT -->
    <a href="signIn.html" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <!-- Logo RIGHT -->
    <div class="logo">
        <div class="logo-icon">
            <img src="images/Sientenium.jpg" alt="Sientenium Logo">
        </div>
        <span>Sientenium</span>
    </div>

</div>

    <!-- Form -->
    <div class="form-container">

        <div id="customAlert" class="alert"></div>
        
        <h2>Create Account</h2>
        <form id="signupForm">
             <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="fullName" placeholder="Full Name" required>
            </div>
            
<div class="input-group">
    <i class="fa-solid fa-building"></i>
    <select id="department" required>
        <option value="" disabled selected>Select Department</option>
        <option value="Finance & Accounting">Finance & Accounting</option>
        <option value="IT">IT</option>
        <option value="Logistics">Logistics</option>
        <option value="HR">HR</option>
    </select>
</div>

<div class="input-group">
    <i class="fa-solid fa-user-tag"></i>
    <select id="role" required>
        <option value="" disabled selected>Select Role</option>
        <option value="Staff/Borrower">Staff/Borrower</option>
        <option value="Manager">Manager</option>
    </select>
</div>
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="Email" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required
                >

                <i class="fa-solid fa-eye toggle-password"
                data-target="password"></i>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-check-circle"></i>

                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm Password"
                    required
                >

                <i class="fa-solid fa-eye toggle-password"
                data-target="confirmPassword"></i>
            </div>



            <div class="terms-group" style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px; font-size: 13px; color: #555;">
                <input type="checkbox" id="termsCheckbox" required style="width: 18px; height: 18px; cursor: pointer;">
                <label for="termsCheckbox" style="cursor: pointer;">
                    I agree to the <a href="termsandconditions.html" target="_blank" style="color: #003366; text-decoration: underline; font-weight: 600;">Terms and Conditions</a>
                </label>
            </div>

            <button type="submit" class="btn">Sign Up</button>
        </form>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>© 2026 Sientenium Inc.</p>
        <a href="termsandconditions.html">Terms and Conditions</a>
        <a href="contactus.html">Contact Us</a>
    </div>

</div>


</div>

<script src="scripts/sign-Up.js"></script>
</body>
</html>
