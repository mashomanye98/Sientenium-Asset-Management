<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan App - Sign Up</title>
    <link rel="stylesheet" href="styles/sign-Up.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- LEFT PANEL -->
    <div class="left-panel">
        <!-- Tagline in center -->
        <div class="overlay">
            <p class="tagline">Your Assets. Organized. Protected and Optimized.</p>
        </div>
    </div>
      

    <!-- RIGHT PANEL -->
<div class="right-panel">

    <div class="top-bar">

    <!-- Back Button LEFT -->
    <a href="signIn.html" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <!-- Logo RIGHT -->
    <div class="logo">
        <div class="logo-icon">
            <i class="fa-solid fa-chart-line"></i>
        </div>
        <span>Sientenium</span>
    </div>

</div>

    <!-- Form -->
    <div class="form-container">

        <div id="customAlert" class="alert"></div>
        
        <h2>Create Account</h2>
        <form id="signupForm">
             <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="fullName" placeholder="Full Name" required>
            </div>
            
<div class="input-group">
    <i class="fa-solid fa-building"></i>
    <select id="department" required>
        <option value="" disabled selected>Select Department</option>
        <option value="Management">Management</option>
        <option value="Staff/Borrower">Staff/Borrower</option>
    </select>
</div>
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="Email" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required
                >

                <i class="fa-solid fa-eye toggle-password"
                data-target="password"></i>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-check-circle"></i>

                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm Password"
                    required
                >

                <i class="fa-solid fa-eye toggle-password"
                data-target="confirmPassword"></i>
            </div>

            <button type="submit" class="btn">Sign Up</button>
        </form>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>© 2026 Sientenium Inc.</p>
        <a href="terms&conditions.html">Terms and Conditions</a>
        <a href="contactus.html">Contact Us</a>
    </div>

</div>


</div>

<script src="scripts/sign-Up.js"></script>
</body>
</html>
