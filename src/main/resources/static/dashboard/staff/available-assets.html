<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Assets</title>
    <link rel="stylesheet" href="../styling/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{
            --primary:#1E3259;
            --secondary:#162440;
            --text:#515D73;
            --muted:#8D95A6;
            --bg:#F2F2F2;
            --white:#ffffff;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);}

        .dashboard { display: flex; gap: 0; min-height: 100vh; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }

        /* FILTER BAR */
        .filter-bar{
            background:var(--white);
            border-radius:14px;
            padding:18px 24px;
            display:flex;
            align-items:center;
            gap:12px;
            margin-bottom:28px;
            flex-wrap:wrap;
            box-shadow:0 4px 14px rgba(0,0,0,.04);
        }

        .filter-bar-label{
            font-weight:600;
            color:var(--secondary);
            font-size:.9rem;
            margin-right:4px;
            white-space:nowrap;
        }

        .filter-chips{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
        }

        .filter-chip{
            padding:8px 20px;
            border-radius:50px;
            border:1.5px solid #dce3ef;
            background:white;
            color:var(--text);
            font-family:'Inter',sans-serif;
            font-size:.85rem;
            font-weight:500;
            cursor:pointer;
            transition:.2s;
        }

        .filter-chip:hover{
            border-color:var(--primary);
            color:var(--primary);
            background:#eef2fb;
        }

        .filter-chip.active{
            background:var(--primary);
            color:white;
            border-color:var(--primary);
        }

        /* SEARCH BAR */
        .search-wrap{
            margin-left:auto;
            display:flex;
            align-items:center;
            gap:8px;
            background:#f4f6fb;
            border:1.5px solid #e4e8f0;
            border-radius:10px;
            padding:9px 14px;
        }

        .search-wrap i{color:var(--muted);font-size:.85rem;}

        .search-wrap input{
            border:none;
            background:transparent;
            font-family:'Inter',sans-serif;
            font-size:.85rem;
            color:var(--text);
            outline:none;
            width:200px;
        }

        /* PRODUCT GRID */
        .product-grid{
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:20px;
        }

        /* PRODUCT CARD */
        .product-card{
            background:var(--white);
            border-radius:16px;
            overflow:hidden;
            position:relative;
            box-shadow:0 4px 16px rgba(0,0,0,.05);
            transition:.25s;
            cursor:pointer;
        }

        .product-card:hover{
            box-shadow:0 10px 30px rgba(30,50,89,.12);
            transform:translateY(-2px);
        }

        /* SALE BADGE */
        .sale-tag{
            position:absolute;
            top:12px;
            left:12px;
            width:36px;height:36px;
            background:var(--primary);
            border-radius:8px;
            display:flex;align-items:center;justify-content:center;
            color:white;
            font-size:.65rem;
            font-weight:700;
            text-align:center;
            line-height:1.2;
            z-index:2;
        }

        .discount-badge{
            position:absolute;
            top:52px;
            left:12px;
            background:var(--primary);
            color:white;
            font-size:.75rem;
            font-weight:700;
            padding:4px 8px;
            border-radius:6px;
            z-index:2;
        }

        /* WISHLIST */
        .wishlist-btn{
            position:absolute;
            top:12px;
            right:12px;
            width:32px;height:32px;
            border-radius:50%;
            background:white;
            border:1.5px solid #e4e8f0;
            display:flex;align-items:center;justify-content:center;
            cursor:pointer;
            color:var(--muted);
            font-size:.85rem;
            z-index:2;
            transition:.2s;
        }

        .wishlist-btn:hover{color:#EF4444;border-color:#EF4444;}
        .wishlist-btn.active{color:#EF4444;border-color:#EF4444;}

        /* PRODUCT IMAGE */
        .product-img-wrap{
            width:100%;
            height:190px;
            background:#f4f6fb;
            display:flex;
            align-items:center;
            justify-content:center;
            position:relative;
            overflow:hidden;
        }

        .product-img-wrap img{
            width:100%;
            height:100%;
            object-fit:contain;
            padding:16px;
        }

        /* PHOTO COUNT */
        .photo-count{
            position:absolute;
            bottom:10px;
            left:10px;
            background:rgba(255,255,255,.9);
            border-radius:8px;
            padding:4px 10px;
            font-size:.75rem;
            color:var(--text);
            display:flex;
            align-items:center;
            gap:5px;
            font-weight:500;
        }

        /* PRODUCT INFO */
        .product-info{
            padding:16px;
        }

        .product-name{
            font-size:.9rem;
            font-weight:600;
            color:var(--secondary);
            margin-bottom:6px;
            line-height:1.4;
            display:-webkit-box;
            -webkit-line-clamp:2;    line-clamp:2;    -webkit-box-orient:vertical;
            overflow:hidden;
        }

        .product-brand{
            font-size:.8rem;
            color:var(--muted);
            margin-bottom:8px;
            font-weight:500;
        }

        .price-row{
            display:flex;
            gap:6px;
            margin-bottom:10px;
        }

        .price{
            font-size:.95rem;
            font-weight:700;
            color:var(--primary);
        }

        .availability{
            font-size:.8rem;
            color:#059669;
            margin-bottom:8px;
        }

        .in-stock{
            display:flex;
            align-items:center;
            gap:4px;
        }

        .delivery-row{
            font-size:.8rem;
            color:var(--text);
            margin-bottom:8px;
            display:flex;
            align-items:center;
            gap:4px;
        }

        .rating-row{
            display:flex;
            gap:4px;
            margin-bottom:10px;
            flex-wrap:wrap;
        }

        .loc-chip{
            background:#eef2fb;
            color:var(--primary);
            padding:4px 10px;
            border-radius:20px;
            font-size:.75rem;
            font-weight:500;
        }

        .add-btn{
            width:100%;
            padding:10px;
            background:var(--primary);
            color:white;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-weight:600;
            font-size:.85rem;
            transition:.2s;
        }

        .add-btn:hover{
            opacity:.9;
        }

        .no-results{
            grid-column:1/-1;
            text-align:center;
            padding:60px 20px;
            color:var(--muted);
            font-size:1rem;
        }
        .product-name{
            font-size:.9rem;
            font-weight:600;
            color:var(--secondary);
            margin-bottom:6px;
            line-height:1.4;
            display:-webkit-box;
            -webkit-line-clamp:2;
            line-clamp:2;
            -webkit-box-orient:vertical;
            overflow:hidden;
        }

        .product-brand{
            color:var(--primary);
            font-size:.82rem;
            font-weight:600;
            margin-bottom:10px;
        }

        .price-row{
            display:flex;
            align-items:center;
            gap:8px;
            margin-bottom:6px;
            flex-wrap:wrap;
        }

        .price{
            font-size:1.1rem;
            font-weight:700;
            color:var(--secondary);
        }

        .price-original{
            font-size:.82rem;
            color:var(--muted);
            text-decoration:line-through;
        }

        .availability{
            font-size:.8rem;
            font-weight:600;
            margin-bottom:6px;
        }

        .in-stock{color:#10B981;}
        .ships{color:var(--muted);}

        .delivery-row{
            display:flex;
            align-items:center;
            gap:6px;
            font-size:.78rem;
            color:var(--muted);
            margin-bottom:8px;
        }

        .delivery-row i{font-size:.75rem;}

        /* LOCATION CHIPS */
        .location-chips{
            display:flex;
            gap:5px;
            flex-wrap:wrap;
            margin-bottom:10px;
        }

        .loc-chip{
            padding:3px 9px;
            border-radius:50px;
            border:1.5px solid #dce3ef;
            font-size:.72rem;
            font-weight:600;
            color:var(--text);
        }

        /* RATING */
        .rating-row{
            display:flex;
            align-items:center;
            gap:5px;
            font-size:.8rem;
            color:var(--muted);
            margin-bottom:14px;
        }

        .rating-row i{color:#F59E0B;font-size:.8rem;}

        .rating-row .score{
            font-weight:700;
            color:var(--secondary);
        }

        /* ADD TO CART */
        .add-btn{
            width:100%;
            padding:12px;
            border:2px solid var(--primary);
            background:white;
            color:var(--primary);
            font-family:'Inter',sans-serif;
            font-size:.88rem;
            font-weight:700;
            border-radius:10px;
            cursor:pointer;
            display:flex;
            align-items:center;
            justify-content:center;
            gap:8px;
            transition:.2s;
        }

        .add-btn:hover{
            background:var(--primary);
            color:white;
        }

        .add-btn.options{
            border-color:var(--primary);
            color:var(--primary);
        }

        /* NO RESULTS */
        .no-results{
            grid-column:1/-1;
            text-align:center;
            padding:60px 20px;
            color:var(--muted);
            font-size:1rem;
        }

        @media(max-width:1100px){.product-grid{grid-template-columns:repeat(3,1fr);}}
        @media(max-width:800px){.product-grid{grid-template-columns:repeat(2,1fr);}}
        @media(max-width:500px){.product-grid{grid-template-columns:1fr;}}
        @media(max-width:1100px){.product-grid{grid-template-columns:repeat(3,1fr);}}
        @media(max-width:800px){.product-grid{grid-template-columns:repeat(2,1fr);}}
        @media(max-width:500px){.product-grid{grid-template-columns:1fr;}}
    </style>
</head>
<body>

<div class="dashboard">

    <!-- ==================================
         SIDEBAR
    =================================== -->
    <aside class="sidebar">
        <div>
            <!-- USER PROFILE (Staff Context) -->
            <div class="profile">
                <div class="profile-image">
                    <img src="https://static.vecteezy.com/system/resources/thumbnails/036/280/651/small_2x/default-avatar-profile-icon-social-media-user-image-gray-avatar-icon-blank-profile-silhouette-illustration-vector.jpg" alt="Profile">
                </div>
                <h3 id="profileName">Staff Member</h3>
                <p>Staff</p>
                <span>Sientenium Asset Management</span>
            </div>

            <nav>
                <a href="staff-dashboard.html">
                    <i class="fa-solid fa-house"></i>
                    Dashboard
                </a>
                <a href="available-assets.html" class="active">
                    <i class="fa-solid fa-box"></i>
                    Available Assets
                </a>
                <a href="loan-request.html">
                    <i class="fa-solid fa-hand-holding"></i>
                    Loan Requests
                    <span class="badge">4</span>
                </a>
                <a href="#">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                    Loan History
                </a>
                <a href="return-assets.html">
                    <i class="fa-solid fa-rotate-left"></i>
                    Return Asset
                </a>
            </nav>
        </div>
        <button class="logout-btn">
            <i class="fa-solid fa-right-from-bracket"></i>
            Logout
        </button>
    </aside>

    <!-- ==================================
         MAIN CONTENT
    =================================== -->
    <main class="main-content">
        <span class="filter-bar-label"><i class="fas fa-bolt" style="color:var(--primary);margin-right:6px"></i>Get It Fast: Filter By In Stock Near You</span>
        <div class="filter-chips">
            <button class="filter-chip" onclick="filterLocation(this,'Cape Town')">Cape Town</button>
            <button class="filter-chip" onclick="filterLocation(this,'Johannesburg')">Johannesburg</button>
            <button class="filter-chip" onclick="filterLocation(this,'Durban')">Durban</button>
        </div>
        <div class="search-wrap">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search assets…" oninput="applyFilters()">
        </div>

        <!-- PRODUCT GRID -->
        <div class="product-grid" id="productGrid"></div>
    </main>
</div>

<script>
    function updateProfileName() {
        try {
            const user = JSON.parse(sessionStorage.getItem('currentUser'));
            if (user && user.fullName) {
                document.getElementById('profileName').textContent = user.fullName;
            }
        } catch (e) {
            console.log('Could not load user profile');
        }
    }
    updateProfileName();
</script>
<script src="/dashboard/scripts/available-assets.js"></script>
</body>
</html>
