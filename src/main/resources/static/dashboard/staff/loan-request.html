<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Request</title>
    <link rel="stylesheet" href="../styling/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .loan-request-layout {
            display: grid;
            grid-template-columns: 1.2fr .8fr;
            gap: 24px;
            margin-top: 24px;
        }

        .loan-request-card {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .loan-request-card h2 {
            margin-bottom: 12px;
            color: var(--secondary);
        }

        .form-group {
            display: grid;
            gap: 8px;
        }

        .form-group label {
            font-size: .95rem;
            font-weight: 600;
            color: var(--text);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            border: 1px solid #dcdce4;
            border-radius: 12px;
            padding: 12px 14px;
            font-family: 'Inter', sans-serif;
            font-size: .95rem;
            color: var(--secondary);
            background: white;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(30, 50, 89, 0.08);
        }

        .form-group input:disabled,
        .form-group select:disabled {
            background-color: #f9f9f9;
            cursor: not-allowed;
            color: var(--muted);
        }

        .form-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 6px;
        }

        .primary-button,
        .secondary-button {
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: .95rem;
            transition: .2s;
        }

        .primary-button {
            background: var(--primary);
            color: white;
        }

        .primary-button:hover {
            opacity: 0.9;
        }

        .secondary-button {
            background: #f4f6fb;
            color: var(--secondary);
        }

        .secondary-button:hover {
            background: #e8ecf5;
        }

        .asset-preview {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .asset-preview-image {
            background: #f4f6fb;
            border-radius: 18px;
            overflow: hidden;
            min-height: 320px;
            display: grid;
            place-items: center;
        }

        .asset-preview-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .asset-meta {
            display: grid;
            gap: 10px;
        }

        .asset-meta .meta-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            padding: 12px 16px;
            background: white;
            border-radius: 14px;
            border: 1px solid #e7e8ee;
        }

        .asset-meta .meta-row span {
            color: var(--muted);
            font-size: .9rem;
        }

        .asset-meta .meta-row strong {
            color: var(--secondary);
        }

        .alert {
            display: none;
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .alert.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .alert.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }

        @media (max-width: 1200px) {
            .loan-request-layout {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .form-actions {
                flex-direction: column;
            }

            .primary-button,
            .secondary-button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="dashboard">
    <aside class="sidebar">
        <div>
            <!-- USER PROFILE (Staff Context) -->
            <div class="profile">
                <div class="profile-image">
                    <img src="https://static.vecteezy.com/system/resources/thumbnails/036/280/651/small_2x/default-avatar-profile-icon-social-media-user-image-gray-avatar-icon-blank-profile-silhouette-illustration-vector.jpg" alt="Profile">
                </div>
                <h3 id="profileName">Staff Member</h3>
                <p>Staff</p>
                <span>Sientenium Asset Management</span>
            </div>

            <nav>
                <a href="staff-dashboard.html">
                    <i class="fa-solid fa-house"></i>
                    Dashboard
                </a>
                <a href="available-assets.html">
                    <i class="fa-solid fa-box"></i>
                    Available Assets
                </a>
                <a href="loan-request.html">
                    <i class="fa-solid fa-hand-holding"></i>
                    Loan Requests
                    <span class="badge" id="loanRequestsBadge">0</span>
                </a>
                <a href="loan-history.html">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                    Loan History
                </a>
                <a href="return-assets.html">
                    <i class="fa-solid fa-rotate-left"></i>
                    Return Asset
                </a>
            </nav>
        </div>

        <button class="logout-btn">
            <i class="fa-solid fa-right-from-bracket"></i>
            Logout
        </button>
    </aside>
    <main class="main-content">
        <div class="top-bar">
            <div>
                <h1>Loan Request</h1>
                <p>Complete the form below to request this asset.</p>
            </div>
            <button class="secondary-button" onclick="window.history.back()">Return</button>
        </div>

        <div id="loanAlert" class="alert error"></div>

        <div class="loan-request-layout">
            <section class="loan-request-card card">
                <h2>Loan Request Form</h2>
                <form id="loanRequestForm">
                    <div class="form-group">
                        <label for="assetId">Asset ID</label>
                        <input type="text" id="assetId" name="assetId" readonly>
                    </div>
                    <div class="form-group">
                        <label for="assetCategory">Asset Category</label>
                        <input type="text" id="assetCategory" readonly>
                    </div>
                    <div class="form-group">
                        <label for="userId">User ID</label>
                        <input type="text" id="userId" readonly>
                    </div>
                    <div class="form-group">
                        <label for="userName">User Name</label>
                        <input type="text" id="userName" readonly>
                    </div>
                    <div class="form-group">
                        <label for="department">Department</label>
                        <select id="department" disabled>
                            <option value="">Select Department</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="dueDate">Due Date</label>
                        <input type="date" id="dueDate" name="dueDate" required>
                    </div>
                    <div class="form-group">
                        <label for="notes">Notes (optional)</label>
                        <textarea id="notes" name="notes" rows="4" placeholder="Enter additional details or reason for request"></textarea>
                    </div>
                    <div class="form-actions">
                        <button class="primary-button" type="submit">Submit Request</button>
                        <button class="secondary-button" type="button" onclick="window.history.back()">Cancel</button>
                    </div>
                </form>
            </section>

            <section class="loan-request-card card asset-preview">
                <div class="asset-preview-image" id="assetImageWrapper">
                    <i class="fas fa-box-open" style="font-size:3rem;color:#cdd5e0;"></i>
                </div>
                <div class="asset-meta">
                    <div class="meta-row">
                        <span>Asset Title</span>
                        <strong id="assetTitle">Loading...</strong>
                    </div>
                    <div class="meta-row">
                        <span>Location</span>
                        <strong id="assetLocation">—</strong>
                    </div>
                    <div class="meta-row">
                        <span>Condition</span>
                        <strong id="assetCondition">—</strong>
                    </div>
                    <div class="meta-row">
                        <span>Value</span>
                        <strong id="assetCost">—</strong>
                    </div>
                    <div class="meta-row">
                        <span>Status</span>
                        <strong id="assetStatus">—</strong>
                    </div>
                </div>
            </section>
        </div>
    </main>
</div>

<script>
    function updateProfileName() {
        try {
            const user = JSON.parse(sessionStorage.getItem('currentUser'));
            if (user && user.fullName) {
                document.getElementById('profileName').textContent = user.fullName;
            }
        } catch (e) {
            console.log('Could not load user profile');
        }
    }
    updateProfileName();
</script>
<script src="/dashboard/scripts/loan-request.js"></script>
</body>
</html>
