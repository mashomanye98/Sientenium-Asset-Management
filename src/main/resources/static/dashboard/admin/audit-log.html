<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styling/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <title>Sientenium | Audit Logs</title>
</head>
<body data-admin-page="audit-log">
<div class="dashboard">
    <aside class="sidebar" data-admin-sidebar></aside>

    <main class="main-content">
        <div class="top-bar">
            <div>
                <h1>Audit Logs</h1>
                <p>Complete activity trail — every action taken across assets, loans, and users.</p>
            </div>
            <div class="header-actions">
                <div class="api-status">
                    <span class="api-dot" id="apiDot"></span>
                    <span id="apiLabel">Connecting...</span>
                </div>
                <button class="btn-secondary" onclick="loadLogs()"><i class="fas fa-sync-alt"></i> Refresh</button>
                <button class="btn-primary" onclick="exportCSV()"><i class="fas fa-file-export"></i> Export CSV</button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-history"></i> Activity Trail</h2>
                <div class="filter-bar" style="border:none; padding:0; background:none; margin:0; display:flex; gap:10px;">
                    <input type="text" id="searchInput" class="search-input" placeholder="Search by user or entity..." oninput="renderTable()">
                    <select id="entityFilter" class="search-input" style="min-width:120px;" onchange="renderTable()">
                        <option value="">All Entities</option>
                        <option value="ASSET">Asset</option>
                        <option value="LOAN">Loan</option>
                        <option value="USER">User</option>
                    </select>
                    <select id="actionFilter" class="search-input" style="min-width:120px;" onchange="renderTable()">
                        <option value="">All Actions</option>
                        <option value="CREATE">Create</option>
                        <option value="UPDATE">Update</option>
                        <option value="DELETE">Delete</option>
                        <option value="APPROVE">Approve</option>
                        <option value="REJECT">Reject</option>
                        <option value="REQUEST">Request</option>
                        <option value="RETIRE">Retire</option>
                        <option value="CHECK_OUT">Check Out</option>
                        <option value="CHECK_IN">Check In</option>
                        <option value="DEACTIVATE">Deactivate</option>
                    </select>
                </div>
            </div>
            <div class="record-count" id="recordCount" style="margin-bottom:15px; font-size:0.8rem; color:var(--muted);">— records</div>
            <div class="table-wrapper">
                <table id="auditTable">
                    <thead>
                    <tr>
                        <th>Log ID</th>
                        <th>Username</th>
                        <th>Action</th>
                        <th>Activity</th>
                        <th>Entity</th>
                        <th>Date</th>
                    </tr>
                    </thead>
                    <tbody id="logBody">
                    <tr><td colspan="6" class="empty-state">Loading audit logs...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script src="../scripts/admin-sidebar.js"></script>
<script src="../scripts/audit-log.js"></script>

</body>
</html>
